name: SNAPY Deploy

on:
  push:
    branches: [ main, prod ]

env:
  APP_NAME: messi-of-coding
  APP_DIR: /home/ec2-user/app
  JAR_NAME: messi-of-coding-0.0.1-SNAPSHOT.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: JDK 21 설정
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: 배포 디렉토리 생성
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            mkdir -p ${{ env.APP_DIR }}

      - name: jar 파일 전송
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          source: "build/libs/${{ env.JAR_NAME }}"
          target: "${{ env.APP_DIR }}"
          strip_components: 2

      - name: 서버 재시작
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            # PID 파일 기반 기존 프로세스 종료
            PID_FILE="${{ env.APP_DIR }}/${{ env.APP_NAME }}.pid"
            if [ -f "$PID_FILE" ]; then
              kill "$(cat "$PID_FILE")" 2>/dev/null || true
              rm -f "$PID_FILE"
            fi

            # 이전 jar 제거 후 새 jar만 유지
            find ${{ env.APP_DIR }} -name '*.jar' ! -name '${{ env.JAR_NAME }}' -delete

            # 새 jar 실행 (백그라운드)
            nohup java -jar ${{ env.APP_DIR }}/${{ env.JAR_NAME }} \
              --spring.profiles.active=deploy \
              --spring.datasource.url="${{ secrets.DB_URL }}" \
              --spring.datasource.username="${{ secrets.DB_USERNAME }}" \
              --spring.datasource.password="${{ secrets.DB_PASSWORD }}" \
              --spring.cloud.aws.region.static=ap-northeast-2 \
              --snapy.s3.bucket="${{ secrets.S3_BUCKET }}" \
              --snapy.cloudfront.domain="${{ secrets.CLOUDFRONT_DOMAIN }}" \
              > ${{ env.APP_DIR }}/app.log 2>&1 &

            # PID 저장
            echo $! > "$PID_FILE"

            echo "배포 완료"